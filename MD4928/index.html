<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>김주임 개인 사이트</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 배경 -->
<div class="background">
    <div class="bg-glow glow1"></div>
    <div class="bg-glow glow2"></div>
    <div class="noise"></div>
</div>

<!-- 메인 카드 -->
<div class="card" id="card">

    <!-- 경고 아이콘 -->
    <div class="warning-area">

        <svg class="warning-icon" viewBox="0 0 64 64">

            <defs>
                <linearGradient id="warningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#ff355d"/>
                    <stop offset="100%" stop-color="#ffd500"/>
                </linearGradient>
            </defs>

            <!-- 삼각형 -->
            <path
                d="M32 6 L58 52 H6 Z"
                fill="none"
                stroke="url(#warningGradient)"
                stroke-width="3"
                stroke-linejoin="round"/>

            <!-- 느낌표 -->
            <rect
                x="30"
                y="20"
                width="4"
                height="17"
                rx="2"
                fill="url(#warningGradient)"/>

            <!-- 점 -->
            <circle
                cx="32"
                cy="44"
                r="2.8"
                fill="#ffd500"/>

        </svg>

    </div>

    <!-- 제목 -->

    <h1>김주임 서류함</h1>

    <h2>기밀서류 접근 금지</h2>

    <p class="subtitle">
        승인된 사용자 비밀번호를 입력하세요.
    </p>

    <p class="notice-top">
        *이 프로젝트의 기밀 정보에 대한 비인가 접근은 엄격히 제한됩니다.*
    </p>

    <!-- 입력창 -->

    <div class="input-box">

        <svg class="lock-icon" viewBox="0 0 24 24">

            <path
                d="M7 10V7a5 5 0 0110 0v3"
                fill="none"
                stroke="currentColor"
                stroke-width="2"/>

            <rect
                x="5"
                y="10"
                width="14"
                height="10"
                rx="2"
                fill="none"
                stroke="currentColor"
                stroke-width="2"/>

        </svg>

        <input
            type="password"
            id="password"
            placeholder="비밀번호 입력">

    </div>

    <!-- 버튼 -->

    <button id="loginBtn">

        <span class="shine"></span>

        <svg class="shield-icon" viewBox="0 0 24 24">

            <path
                d="M12 2l8 3v6c0 5-3.5 8-8 11-4.5-3-8-6-8-11V5z"
                fill="none"
                stroke="currentColor"
                stroke-width="2"/>

            <path
                d="M9.5 12l2 2 4-4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"/>

        </svg>

        승인 요청

    </button>

    <!-- 구분선 -->

    <div class="divider">
        <span>안내사항</span>
    </div>

    <!-- 안내 -->

    <div class="info">

        <p>접근 시도는 모두 기록 및 모니터링됩니다.</p>

    </div>

    <!-- 하단 -->

    <div class="footer">

        <svg class="mini-warning" viewBox="0 0 64 64">

            <path
                d="M32 6 L58 52 H6 Z"
                fill="none"
                stroke="#ffb300"
                stroke-width="3"
                stroke-linejoin="round"/>

            <rect
                x="30"
                y="20"
                width="4"
                height="17"
                rx="2"
                fill="#ffb300"/>

            <circle
                cx="32"
                cy="44"
                r="2.5"
                fill="#ffb300"/>

        </svg>

        <span>RESTRICTED PROJECT</span>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
