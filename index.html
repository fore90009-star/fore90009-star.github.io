<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세하치과</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="card">

<div class="logo">

<svg viewBox="0 0 64 64">
<path d="M32 8
L48 15
V29
C48 40
40 49
32 56
24 49
16 40
16 29
V15
Z"
fill="none"
stroke="white"
stroke-width="3"/>

<rect
x="25"
y="28"
width="14"
height="12"
rx="2"
fill="white"/>

<path
d="M28 28
V24
A4 4 0 0 1 36 24
V28"

stroke="#6d5cff"

</svg>

<h1>국가데이터처</h1>

<h2>비밀번호를 입력하여 접속하세요.</h2>

<p class="desc">
네이버 플레이스 예약창 요청사항에<br>
소속과 비밀번호를 입력해주세요.
</p>

<div class="inputBox">

<input
type="password"
id="pw"
placeholder="비밀번호 입력">

</div>

<button id="loginBtn">
확인
</button>

<div class="line">
<span>안내사항</span>
</div>

<p class="notice">
입력하신 정보는 안전하게 보호되며<br>
권한이 있는 사용자만 접근 가능합니다.
</p>

<div class="footer">

<svg width="18" height="18" viewBox="0 0 24 24">

<path
d="M6 10
V7
A6 6 0 0 1 18 7
V10"

fill="none"
stroke="#2ad58d"
stroke-width="2"/>

<rect
x="4"
y="10"
width="16"
height="10"
rx="2"
fill="none"
stroke="#2ad58d"
stroke-width="2"/>

</svg>

<span>Secure Access</span>

</div>

</div>
