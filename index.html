<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호 확인</title>
    <style>
        /* 배경 및 전체 레이아웃 */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url/배경.png; /* 배경 이미지 적용 시 */
            background-color: #333; /* 기본 배경색 */
            font-family: sans-serif;
        }
        /* 중앙 검은색 팝업창 */
        .lock-container {
            background-color: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { font-size: 20px; margin-bottom: 10px; word-break: keep-all; }
        p { font-size: 13px; color: #ccc; margin-bottom: 20px; line-height: 1.5; }
        /* 입력창 */
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }
        /* 확인 버튼 */
        button {
            width: 100%;
            padding: 15px;
            background-color: #ff4d4d; /* 이미지와 유사한 붉은 톤 */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background-color: #e60000; }
    </style>
</head>
<body>

<div class="lock-container">
    <h2>국가데이터처
    <p>비밀번호를 입력하여 접속하세요.<br>*네이버 플레이스 예약창 요청사항에 본인의 소속과 비밀번호를 적어주세요*</p>
    
    <input type="password" id="passwordInput" placeholder="비밀번호 입력">
    <button onclick="checkPassword()">확인</button>
</div>

<script>
    function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        if (password === '2580') { 
            window.location.href = 'http://map.naver.com/p/entry/place/34347279?placePath=%252Fhome%253Fentry%253Dplt&searchType=place&lng=127.3772650&lat=36.3527016'; 
        } else {
            alert('비밀번호가 올바르지 않습니다.');
        }
    }
</script>

</body>
</html>
